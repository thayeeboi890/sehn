name: Upload to Fedora COPR
on:
  release:
    types: [published]
jobs:
  copr-upload:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install System Build Tooling
        run: dnf install -y git meson ninja-build rpm-build rpmdevtools copr-cli
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download meson subprojects
        run: meson subprojects download
      - name: Generate Spec File, Tarball, and SRPM
        run: |
          VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/v//')

          cat << 'EOF' > sehn.spec
          Name:           sehn
          Version:        PKGVERSION
          Release:        1%{?dist}
          Summary:        Core binaries for the sehn package engine
          License:        MIT
          URL:            https://github.com/thayeeboi890/sehn
          Source0:        %{name}-PKGVERSION.tar.gz
          BuildRequires:  meson
          BuildRequires:  ninja-build
          BuildRequires:  gcc-c++
          BuildRequires:  pkgconfig
          BuildRequires:  libX11-devel
          BuildRequires:  libXext-devel
          BuildRequires:  libjpeg-turbo-devel
          BuildRequires:  libpng-devel
          BuildRequires:  libv4l-devel
          BuildRequires:  ffmpeg-free-devel
          BuildRequires:  pulseaudio-libs-devel
          BuildRequires:  libXft-devel
          BuildRequires:  cairo-devel
          BuildRequires:  libexif-devel
          BuildRequires:  libcurl-devel
          %description
          Core binaries for the sehn package engine.
          %prep
          %autosetup -n %{name}-PKGVERSION
          %build
          %meson
          %meson_build
          %install
          %meson_install
          %files
          %{_bindir}/sehn
          %{_datadir}/applications/sehn.desktop
          %{_datadir}/icons/hicolor/scalable/apps/sehn.svg
          %{_datadir}/doc/sehn/*
          %{_datadir}/fonts/sehn/*
          %{_mandir}/man1/sehn.1*
          %changelog
          * Wed Jun 24 2026 Y3E <thayeeboi890@gmail.com> - PKGVERSION-1
          - Automated production release of sehn PKGVERSION
          EOF

          sed -i "s/PKGVERSION/$VERSION/g" sehn.spec

          rpmdev-setuptree

          mkdir sehn-${VERSION}
          find . -maxdepth 1 ! -name "sehn-${VERSION}" ! -name "." -exec cp -r {} sehn-${VERSION}/ \;
          tar --exclude="sehn-${VERSION}/.git" -czf /root/rpmbuild/SOURCES/sehn-${VERSION}.tar.gz sehn-${VERSION}

          rpmbuild -bs sehn.spec --define "_topdir /root/rpmbuild"

          mv /root/rpmbuild/SRPMS/*.src.rpm .
      - name: Authenticate and Upload to COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          cat << EOF > ~/.config/copr
          [copr-cli]
          username = $COPR_USERNAME
          login = $COPR_LOGIN
          token = $COPR_TOKEN
          copr_url = https://copr.fedorainfracloud.org
          EOF

          copr-cli build y3e-890/sehn *.src.rpm
